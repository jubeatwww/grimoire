server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any unknown path returns index.html so React Router
    # can take it from there.
    location / {
        try_files $uri /index.html;
    }

    # Hashed Vite assets get long cache; index.html stays no-cache so a
    # new deploy reaches the browser on next load.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
