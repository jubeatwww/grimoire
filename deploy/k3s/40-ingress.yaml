# LAN-only allowlist — public DNS resolves grimoire.shar0.dev but
# requests from outside 192.168.1.0/24 get refused at the edge. Same
# pattern n8n / openclaw / llm-mux use. 10.42.0.0/16 is the k3s pod
# CIDR so internal probes still work.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: internal-ip-allowlist
  namespace: grimoire
spec:
  ipWhiteList:
    sourceRange:
      - 192.168.1.0/24
      - 127.0.0.1/32
      - 10.42.0.0/16
---
# Single Ingress, two path rules. Traefik routes /api/* to the Rust
# server, everything else to the nginx-backed SPA. Same-origin = no
# CORS, no env config in the web build, no proxy in the web container.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grimoire-ingress
  namespace: grimoire
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: grimoire-internal-ip-allowlist@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: grimoire.shar0.dev
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: grimoire-server
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grimoire-web
                port:
                  number: 80
  tls:
    - hosts:
        - grimoire.shar0.dev
      secretName: grimoire-tls
